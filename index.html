<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAMCODER Engineer </title>
    <style>
      * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* NAVBAR */
header {
    background: rgba(0,0,0,0.8);
    position: fixed;
    width: 100%;
    top: 0;
    z-index: 1000;
}

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    color: white;
}

nav ul {
    list-style: none;
    display: flex;
}

nav ul li {
    margin-left: 20px;
}

nav ul li a {
    color: white;
    text-decoration: none;
}

/* MOBILE MENU */
.menu-toggle {
    display: none;
    font-size: 28px;
    cursor: pointer;
}

/* HERO */
.hero {
    height: 100vh;
    background: url('khuzaifah.jpg') no-repeat center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

.overlay {
    background: rgba(0,0,0,0.6);
    padding: 30px;
    text-align: center;
    color: white;
    border-radius: 10px;
}

.overlay h2 {
    font-size: 40px;
}

.overlay button {
    margin-top: 15px;
    padding: 10px 20px;
    background: orange;
    border: none;
    color: white;
    border-radius: 5px;
}

/* ABOUT */
.about {
    padding: 60px 20px;
    text-align: center;
}

/* PROJECTS */
.projects {
    padding: 60px 20px;
    text-align: center;
}

.projects-container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.project-box {
    width: 250px;
    height: 150px;
    background: #ddd;
    margin: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #222;
    color: white;
}

/* ========================= */
/* 📱 RESPONSIVE DESIGN */
/* ========================= */

/* Tablets */
@media (max-width: 768px) {
    .overlay h2 {
        font-size: 30px;
    }

    .project-box {
        width: 45%;
    }
}

/* Mobile */
@media (max-width: 600px) {

    .menu-toggle {
        display: block;
    }

    nav ul {
        display: none;
        flex-direction: column;
        background: black;
        position: absolute;
        top: 60px;
        right: 0;
        width: 200px;
        text-align: center;
    }

    nav ul.active {
        display: flex;
    }

    nav ul li {
        margin: 15px 0;
    }

    .overlay h2 {
        font-size: 24px;
    }

    .overlay {
        padding: 20px;
    }

    .project-box {
        width: 90%;
    }
}
    </style>
</head>
<body>

<header>
    <nav>
        <h1>KAMCODER</h1>

        <div class="menu-toggle" id="menu-toggle">
            ☰
        </div>

        <ul id="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Projects</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <div class="overlay">
        <h2>Hello, I'm KAMCODER</h2>
        <p>Professional Engineer | Web Developer</p>
        <button>View My Work</button>
    </div>
</section>

<section class="about">
    <h2>About Me</h2>
    <p>
        I am a passionate engineer who builds modern and scalable systems.
    </p>
</section>



<footer>
    <p>© 2026 KAMCODER Engineer</p>
</footer>

</body>
</html>
